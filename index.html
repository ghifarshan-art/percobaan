<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Online - Kedai Mamayu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fs-3" href="#"><i class="fas fa-pepper-hot me-2"></i>Kedai Mamayu</a>
            <div class="d-flex align-items-center">
                <span class="badge bg-secondary px-3 py-2 rounded-pill me-3">🧑‍🍳 Akun: <span id="display-user">Guest</span></span>
                <a href="login.html" class="btn btn-outline-danger btn-sm rounded-pill"><i class="fas fa-sign-out-alt"></i> Keluar</a>
            </div>
        </div>
    </nav>

    <div class="hero-section text-center mb-5">
        <div class="container">
            <h1 class="display-4 fw-bold mb-2">Selamat Datang di Kedai Mamayu</h1>
            <p class="lead">Pedasnya nagih, hangatnya bikin balik lagi! ❤️</p>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row g-4">
            
            <div class="col-lg-8">
                <div class="d-flex align-items-center mb-3">
                    <h3 class="fw-bold text-dark m-0"><i class="fas fa-utensils text-danger me-2"></i>Aneka Makanan</h3>
                    <div class="flex-grow-1 ms-3 border-bottom border-2 opacity-25"></div>
                </div>
                <div class="row g-3 mb-5" id="container-makanan">
                    </div>

                <div class="d-flex align-items-center mb-3">
                    <h3 class="fw-bold text-dark m-0"><i class="fas fa-glass-whiskey text-danger me-2"></i>Aneka Minuman</h3>
                    <div class="flex-grow-1 ms-3 border-bottom border-2 opacity-25"></div>
                </div>
                <div class="row g-3" id="container-minuman">
                    </div>
            </div>

            <div class="col-lg-4">
                <div class="card border-0 shadow-sm p-4 sticky-top login-card" style="top: 20px; background: white;">
                    <h4 class="fw-bold mb-4 d-flex justify-content-between align-items-center border-bottom pb-2">
                        <span><i class="fas fa-shopping-basket text-danger me-2"></i>Keranjang</span>
                        <span class="badge bg-danger rounded-pill fs-6" id="cart-count">0</span>
                    </h4>
                    
                    <div id="cart-items-list" class="mb-4" style="max-height: 280px; overflow-y: auto;">
                        <p class="text-muted text-center py-4">Keranjangmu masih kosong.</p>
                    </div>
                    
                    <div class="d-flex justify-content-between fw-bold fs-5 mb-4 border-top pt-3">
                        <span>Total Bayar:</span>
                        <span class="text-success" id="cart-total">Rp 0</span>
                    </div>
                    
                    <button class="btn btn-primary-custom w-100 py-2 fs-5 text-white rounded-pill" onclick="checkoutOrder()">
                        <i class="fas fa-paper-plane me-2"></i>Kirim Pesanan Ke Kasir
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
