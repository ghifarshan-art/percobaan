<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Toko Makanan Keren</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-bg">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card login-card p-4">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <i class="fas fa-utensils fa-3x text-danger mb-2"></i>
                        <h3 class="fw-bold">Selamat Datang</h3>
                        <p class="text-muted">Silahkan login ke akun tokomu</p>
                    </div>
                    
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" id="username" class="form-control" placeholder="admin / nama kamu" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" id="password" class="form-control" placeholder="Ketik bebas" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary-custom text-white w-100 py-2 rounded-pill fw-bold">
                            Masuk <i class="fas fa-sign-in-alt ms-1"></i>
                        </button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <small class="text-muted">💡 Ketik <b>admin</b> untuk masuk dashboard kelola, atau ketik nama bebas untuk belanja.</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        
        if(user.toLowerCase() === 'admin') {
            localStorage.setItem('currentUser', 'Admin');
            window.location.href = 'admin.html';
        } else {
            localStorage.setItem('currentUser', user);
            window.location.href = 'index.html';
        }
    });
</script>
</body>
</html>
